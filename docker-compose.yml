version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devportal-db
    environment:
      POSTGRES_DB: devportal_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: devportal-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: devportal-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: devportal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
