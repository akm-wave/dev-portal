spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devportal_new
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/devportal_files}
      database: devportal_files

file:
  upload:
    max-size: 20971520
    allowed-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,image/png,image/jpeg,image/jpg,application/zip

logging:
  level:
    com.devportal: DEBUG
    org.hibernate.SQL: DEBUG
