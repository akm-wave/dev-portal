spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/devportal_sit
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false

logging:
  level:
    com.devportal: INFO
    org.hibernate.SQL: WARN
